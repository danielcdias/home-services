{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        Home Services
      {% endblock %}
    </title>

    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'core/img/favicon-32x32.png' %}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'core/img/favicon-16x16.png' %}" />

    <link rel="shortcut icon" href="{% static 'core/img/favicon.ico' %}" />

    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'core/img/apple-touch-icon.png' %}" />

    <link rel="stylesheet" href="{% static 'core/css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}" />

    <script src="{% static 'core/js/theme.js' %}"></script>
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm bg-brand-primary">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <img src="{% static 'core/img/home-services_logo.png' %}" alt="Logo Home Services" class="navbar-logo me-2" />
          Home Services
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link active" href="/">Dashboard</a>
            </li>
            <li class="nav-item">
              <button id="theme-toggle" class="btn btn-outline-light rounded-circle ms-lg-3 mt-2 mt-lg-0" title="Alternar Tema">🌙</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      {% block content %}

      {% endblock %}
    </main>

    <script src="{% static 'core/js/bootstrap.bundle.min.js' %}?v={% now 'U' %}"></script>
    <script src="{% static 'core/js/main.js' %}?v={% now 'U' %}"></script>
  </body>
</html>
