name: home-services

services:
  postgres:
    container_name: postgres
    hostname: postgres
    image: "postgres:18-trixie"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    container_name: django
    hostname: django
    build:
      context: .
      dockerfile: Containerfile
    image: home-services-appserver:latest
    command: ./django-entrypoint.sh
    env_file:
      - .env
    networks:
      - public_net
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/admin/login/" ]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 30s
      retries: 10

  django-scheduler:
    container_name: django-scheduler
    hostname: django-scheduler
    build:
      context: .
      dockerfile: Containerfile
    image: home-services-appserver:latest
    command: python manage.py scheduler
    env_file:
      - .env
    networks:
      - public_net
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/scheduler_heartbeat.lock -mmin -1 | grep -q . || exit 1"]
      start_period: 5s
      start_interval: 5s
      interval: 30s
      timeout: 10s
      retries: 10

  nginx:
    container_name: nginx
    hostname: nginx
    image: "nginx:1.29-bookworm"
    ports:
      - "80:80"
    volumes:
      - ./nginx/development.conf:/etc/nginx/conf.d/default.conf
    networks:
      - public_net
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  public_net:
  internal_net:

volumes:
  postgres_data:
