name: home-services

services:
  postgres:
    container_name: postgres
    hostname: postgres
    image: "postgres:18-trixie"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    hostname: redis
    image: "redis:8.2-bookworm"
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    container_name: django
    hostname: django
    build:
      context: .
      dockerfile: Containerfile
    image: home-services-appserver:latest
    command: ./django-entrypoint.sh
    env_file:
      - .env
    networks:
      - public_net
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/admin/login/" ]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 30s
      retries: 10

  celery-worker:
    container_name: celery-worker
    hostname: celery-worker
    image: home-services-appserver:latest
    command: celery -A $CELERY_APP_NAME worker -l info
    env_file:
      - .env
    networks:
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    healthcheck:
      test: |
        export HOST_CELERY=$(celery -A $CELERY_APP_NAME status | grep celery | sed -e 's/->  //' -e 's/: OK//') &&
        celery -A $CELERY_APP_NAME inspect ping --destination $$HOST_CELERY
      start_period: 10s
      interval: 10s
      timeout: 10s
      retries: 50

  celery-beat:
    container_name: celery-beat
    hostname: celery-beat
    image: home-services-appserver:latest
    command: celery -A $CELERY_APP_NAME beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    networks:
      - internal_net
    depends_on:
      celery-worker:
        condition: service_healthy
    healthcheck:
      test: |
        export HOST_CELERY=$(celery -A $CELERY_APP_NAME status | grep celery | sed -e 's/->  //' -e 's/: OK//') &&
        celery -A $CELERY_APP_NAME inspect ping --destination $$HOST_CELERY
      start_period: 10s
      interval: 10s
      timeout: 10s
      retries: 50

  nginx:
    container_name: nginx
    hostname: nginx
    image: "nginx:1.29-bookworm"
    ports:
      - "80:80"
    volumes:
      - ./nginx/development.conf:/etc/nginx/conf.d/default.conf
    networks:
      - public_net
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  public_net:
  internal_net:

volumes:
  postgres_data:
